name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --frozen --python ${{ matrix.python-version }}

      - name: Ruff
        run: uv run --frozen --python ${{ matrix.python-version }} ruff check src tests

      - name: Unit tests
        run: uv run --frozen --python ${{ matrix.python-version }} pytest tests/unit -v

      - name: Build wheel
        run: uv build
